<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fitting AI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111;
    }
    header {
      background: #000;
      color: #fff;
      padding: 1.25rem 1.5rem;
    }
    header h1 { margin: 0; font-size: 1.5rem; font-weight: 700; }
    header p { margin: 0.35rem 0 0; opacity: 0.75; font-size: 0.9rem; }
    main { max-width: 720px; margin: 0 auto; padding: 1.5rem; }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      border: 1px solid #e5e5e5;
    }
    label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
    input[type="file"], select {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fafafa;
    }
    .preview-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .thumb {
      margin-top: 0.75rem;
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: 4px;
      background: #eee;
      display: none;
    }
    .thumb.show { display: block; }
    .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    button {
      flex: 1;
      min-width: 120px;
      padding: 0.85rem 1.25rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    #tryBtn { background: #000; color: #fff; }
    #tryBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #saveBtn {
      display: none;
      width: 100%;
      margin-top: 0.75rem;
      background: #fff;
      color: #000;
      border: 2px solid #000;
    }
    #saveBtn.show { display: block; }
    #saveBtn:disabled { opacity: 0.35; cursor: not-allowed; }
    #resultImg {
      width: 100%;
      max-height: 520px;
      object-fit: contain;
      border-radius: 4px;
      background: #eee;
      display: none;
    }
    #resultImg.show { display: block; }
    #progressBar {
      display: none;
      width: 2.5rem;
      height: 2.5rem;
      margin: 1rem auto 0;
      border: 4px solid #ddd;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #progressBar.show { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { margin-top: 0.75rem; font-size: 0.9rem; color: #555; min-height: 1.25rem; }
    #status.error { color: #c00; }
  </style>
</head>
<body>
  <header>
    <h1>Fitting AI</h1>
    <p>온라인 쇼핑몰 가상 피팅 — 사진을 올리고 입어보세요</p>
  </header>
  <main>
    <div class="card preview-row">
      <div>
        <label for="human">사용자 사진</label>
        <input type="file" id="human" accept="image/*" aria-label="사용자 사진 업로드">
        <img id="humanPreview" class="thumb" alt="사용자 미리보기">
      </div>
      <div>
        <label for="garment">옷 사진</label>
        <input type="file" id="garment" accept="image/*" aria-label="옷 사진 업로드">
        <img id="garmentPreview" class="thumb" alt="옷 미리보기">
      </div>
    </div>

    <div class="card">
      <label for="category">의류 카테고리</label>
      <select id="category" aria-label="의류 카테고리">
        <option value="upper_body">상의</option>
        <option value="lower_body">하의</option>
        <option value="dresses">원피스</option>
      </select>
    </div>

    <div class="card actions">
      <button type="button" id="tryBtn" aria-label="입어보기">입어보기</button>
    </div>

    <div class="card">
      <label id="resultTitle">옷을 다 입었어요!</label>
      <img id="resultImg" alt="가상 피팅 결과">
      <button type="button" id="saveBtn" disabled aria-label="결과 저장">저장</button>
      <div id="progressBar" role="progressbar" aria-label="합성 중"></div>
      <p id="status" role="status" aria-live="polite"></p>
    </div>
  </main>

  <script>
    const humanInput = document.getElementById("human");
    const garmentInput = document.getElementById("garment");
    const humanPreview = document.getElementById("humanPreview");
    const garmentPreview = document.getElementById("garmentPreview");
    const category = document.getElementById("category");
    const tryBtn = document.getElementById("tryBtn");
    const saveBtn = document.getElementById("saveBtn");
    const resultTitle = document.getElementById("resultTitle");
    const resultImg = document.getElementById("resultImg");
    const progressBar = document.getElementById("progressBar");
    const status = document.getElementById("status");

    let resultUrl = null;

    function preview(input, img) {
      const file = input.files && input.files[0];
      if (!file) {
        img.classList.remove("show");
        img.removeAttribute("src");
        return;
      }
      img.src = URL.createObjectURL(file);
      img.classList.add("show");
    }

    humanInput.addEventListener("change", () => preview(humanInput, humanPreview));
    garmentInput.addEventListener("change", () => preview(garmentInput, garmentPreview));

    function setStatus(msg, isError) {
      status.textContent = msg;
      status.classList.toggle("error", !!isError);
    }

    function setProgress(active) {
      progressBar.classList.toggle("show", active);
    }

    tryBtn.addEventListener("click", async () => {
      const humanFile = humanInput.files && humanInput.files[0];
      const garmentFile = garmentInput.files && garmentInput.files[0];
      if (!humanFile || !garmentFile) {
        setStatus("사용자 사진과 옷 사진을 모두 선택하세요.", true);
        return;
      }

      resultUrl = null;
      saveBtn.disabled = true;
      saveBtn.classList.remove("show");
      resultImg.classList.remove("show");
      resultTitle.textContent = "옷을 입고 있어요...";
      tryBtn.disabled = true;
      setProgress(true);
      setStatus("합성 중입니다… 약 20~30초 걸릴 수 있습니다.");

      const fd = new FormData();
      fd.append("human", humanFile);
      fd.append("garment", garmentFile);
      fd.append("category", category.value);

      try {
        const res = await fetch("/api/try-on", { method: "POST", body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "합성 실패");
        resultUrl = data.imageUrl;
        resultImg.src = resultUrl;
        resultImg.classList.add("show");
        resultTitle.textContent = "옷을 다 입었어요!";
        saveBtn.disabled = false;
        saveBtn.classList.add("show");
        setProgress(false);
        setStatus("완료! 저장하려면 저장 버튼을 누르세요.");
      } catch (e) {
        resultTitle.textContent = "옷을 다 입었어요!";
        setProgress(false);
        setStatus(e.message || "오류가 발생했습니다.", true);
      } finally {
        tryBtn.disabled = false;
      }
    });

    saveBtn.addEventListener("click", () => {
      if (!resultUrl) return;
      const a = document.createElement("a");
      a.href = "/api/download?url=" + encodeURIComponent(resultUrl);
      a.download = "fitting-ai-result.jpg";
      a.rel = "noopener";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setStatus("저장 대화상자를 확인하세요.");
    });
  </script>
</body>
</html>
